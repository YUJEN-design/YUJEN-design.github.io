<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title> YU JEN TSAI — Graphic & UI Designer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f2ed;
      color: #171717;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 32px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .name {
      font-size: 18px;
      font-weight: 700;
    }

    .nav-links {
      display: flex;
      gap: 24px;
    }

    .nav-links a {
      color: inherit;
      text-decoration: none;
    }

    .hero {
      max-width: 1100px;
      margin: 120px 0;
    }

    h1 {
      max-width: 1000px;
      margin: 0;
      font-size: clamp(52px, 9vw, 140px);
      font-weight: 500;
      line-height: 0.92;
      letter-spacing: -0.06em;
    }

    .intro {
      max-width: 560px;
      margin-top: 40px;
      font-size: 20px;
      line-height: 1.5;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      main {
        padding: 20px;
      }

      .nav-links {
        gap: 14px;
      }

      .hero {
        margin: 100px 0;
      }

      footer {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main>
    <nav>
      <div class="name">YU JEN TSAI</div>

      <div class="nav-links">
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="mailto:f0253039@gmail.com">Contact</a>
      </div>
    </nav>

    <section class="hero">
      <h1>
        Graphic and UI designer creating clear, thoughtful digital experiences.
      </h1>

      <p class="intro">
        I combine visual identity, editorial design and interface design
        to create engaging brands and digital products.
      </p>
    </section>

    <footer>
      <span>Available for selected freelance projects</span>
      <span>Based in Adelaide, Australia</span>
    </footer>
  </main>
</body>
</html>
